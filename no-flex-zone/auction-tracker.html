<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFZ Auction Tracker</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg2: #1a1d2e;
      --bg3: #252840;
      --text: #e8eaf0;
      --muted: #6b7280;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --border: #2d3148;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      border-top: 3px solid var(--blue);
      padding: 16px 28px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
    }

    /* ── Starter divider ── */
    .starter-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 4px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .starter-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .reset-btn {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .reset-btn:hover { color: var(--red); border-color: var(--red); }

    .budget-row {
      display: flex;
      gap: 28px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .budget-stat { display: flex; flex-direction: column; gap: 1px; }

    .budget-stat label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .budget-stat .val {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .val-remaining { color: var(--green); }
    .val-spent     { color: var(--yellow); }
    .val-needed    { color: var(--muted); }
    .val-maxbid    { color: var(--blue); }
    .val-warn      { color: var(--yellow) !important; }
    .val-danger    { color: var(--red) !important; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 9px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: all 0.12s;
      user-select: none;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--blue); }

    /* ── Content ── */
    .content {
      padding: 20px 24px;
      max-width: 860px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-title { font-size: 16px; font-weight: 700; }

    .section-meta {
      font-size: 12px;
      color: var(--muted);
    }
    .section-meta span { color: var(--text); font-weight: 600; }

    /* ── Player rows ── */
    .player-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 28px;
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 0.12s;
    }

    .player-row:hover:not(.won):not(.lost) { border-color: #3d4265; }

    .player-row.won {
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.04);
    }

    .player-row.lost { opacity: 0.3; }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-stat {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }

    .player-stat .hi {
      color: var(--text);
      font-weight: 600;
      font-size: 13px;
    }

    .player-ceil {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      min-width: 52px;
      text-align: right;
    }

    /* ── Actions ── */
    .player-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .won-label {
      color: var(--green);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .lost-label {
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Buttons ── */
    .btn {
      padding: 5px 11px;
      border-radius: 4px;
      border: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .btn-win {
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }
    .btn-win:hover { background: rgba(34, 197, 94, 0.22); }

    .btn-lost {
      background: rgba(107, 114, 128, 0.1);
      color: var(--muted);
      border: 1px solid rgba(107, 114, 128, 0.18);
    }
    .btn-lost:hover { background: rgba(107, 114, 128, 0.2); color: var(--text); }

    .btn-undo {
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 10px;
    }
    .btn-undo:hover { color: var(--text); }

    .btn-hide {
      background: none;
      color: var(--border);
      border: 1px solid var(--border);
      font-size: 11px;
      padding: 4px 8px;
    }
    .btn-hide:hover { color: var(--muted); border-color: var(--muted); }

    /* ── Hidden section ── */
    .hidden-toggle {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      padding: 10px 0 6px;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .hidden-toggle:hover { color: var(--text); }

    .hidden-list { display: none; }
    .hidden-list.open { display: flex; flex-direction: column; gap: 5px; }

    /* ── Price input ── */
    .price-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .price-prefix {
      color: var(--muted);
      font-size: 13px;
    }

    .price-input {
      width: 60px;
      padding: 4px 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .price-input:focus {
      outline: none;
      border-color: var(--green);
    }

    /* ── Roster tab ── */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 28px;
    }

    .roster-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .roster-card-pos {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .roster-card-name {
      font-weight: 600;
      font-size: 14px;
    }

    .roster-card-price {
      color: var(--green);
      font-weight: 700;
      font-size: 16px;
      margin-top: 4px;
    }

    .pos-QB { color: #60a5fa; }
    .pos-TE { color: #a78bfa; }
    .pos-WR { color: #4ade80; }
    .pos-RB { color: #fbbf24; }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Empty state ── */
    .empty-state {
      color: var(--muted);
      font-style: italic;
      padding: 20px 0;
    }

    /* ── Budget breakdown ── */
    .budget-breakdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 280px));
      gap: 24px;
      margin-bottom: 20px;
    }

    .budget-pos {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .budget-pos-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .budget-pos-remaining {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .budget-pos-total {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .budget-bar {
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      margin-top: 7px;
      overflow: hidden;
    }

    .budget-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>

// ── State ────────────────────────────────────────────────────────────────────

const SEED = {
  spent: 220,
  won: 1,
  picks:  { drake_maye: { name: 'Drake Maye', pos: 'QB', price: 220 } },
  hidden: {}
};

function loadState() {
  try {
    const s = localStorage.getItem('nfz_v4');
    const st = s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED));
    if (!st.hidden) st.hidden = {};
    return st;
  } catch { return JSON.parse(JSON.stringify(SEED)); }
}

function save(st) {
  localStorage.setItem('nfz_v4', JSON.stringify(st));
}

let S = loadState();

// ── Computed ─────────────────────────────────────────────────────────────────

const remaining  = () => TOTAL_BUDGET - S.spent;
const needed     = () => TOTAL_ROSTER - S.won;
const maxSafeBid = () => Math.max(1, remaining() - (needed() - 1));

// ── Render header ────────────────────────────────────────────────────────────

function renderHeader() {
  const r = remaining();
  const mb = maxSafeBid();

  document.getElementById('stat-remaining').textContent = `$${r}`;
  document.getElementById('stat-spent').textContent     = `$${S.spent}`;
  document.getElementById('stat-needed').textContent    = needed();
  document.getElementById('stat-maxbid').textContent    = `$${mb}`;

  const el = document.getElementById('stat-remaining');
  el.className = 'val val-remaining';
  if (r < 100)       el.classList.add('val-danger');
  else if (r < 250)  el.classList.add('val-warn');

  const mb_el = document.getElementById('stat-maxbid');
  mb_el.className = 'val val-maxbid';
  if (mb < 50)       mb_el.classList.add('val-danger');
  else if (mb < 150) mb_el.classList.add('val-warn');
}

// ── Render roster ────────────────────────────────────────────────────────────

function renderRoster() {
  const picks = Object.values(S.picks);
  document.getElementById('roster-meta').innerHTML =
    `<span>${picks.length}</span> players &nbsp;·&nbsp; <span>$${S.spent}</span> spent`;

}

// ── Render position list ─────────────────────────────────────────────────────

function ceilColor(c) {
  if (c >= 150) return '#f59e0b';
  if (c >= 60)  return '#fbbf24';
  return 'var(--muted)';
}

function playerRow(p, pos) {
  const pick = S.picks[p.id];
  const lost = S.lost?.[p.id];

  let statusClass = '';
  let actionsHtml = '';

  if (pick) {
    statusClass = 'won';
    actionsHtml = `
      <div class="player-actions">
        <span class="won-label">WON $${pick.price}</span>
        <button class="btn btn-undo" onclick="undoPick('${p.id}','${pos}')">undo</button>
      </div>`;
  } else if (lost) {
    statusClass = 'lost';
    actionsHtml = `
      <div class="player-actions">
        <span class="lost-label">lost</span>
        <button class="btn btn-undo" onclick="undoLost('${p.id}')">undo</button>
      </div>`;
  } else {
    actionsHtml = `
      <div class="player-actions">
        <div class="price-wrap">
          <span class="price-prefix">$</span>
          <input class="price-input" id="inp-${p.id}" type="number" min="1"
            placeholder="${p.ceil}"
            onkeydown="if(event.key==='Enter') winPick('${p.id}','${pos}')">
        </div>
        <button class="btn btn-win"  onclick="winPick('${p.id}','${pos}')">Won</button>
        <button class="btn btn-lost" onclick="markLost('${p.id}')">Lost</button>
        <button class="btn btn-hide" onclick="hidePlayer('${p.id}')" title="Hide">–</button>
      </div>`;
  }

  return `
    <div class="player-row ${statusClass}" id="row-${p.id}">
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-note">${p.note}</div>
      </div>
      <div class="player-stat"><span class="hi">${p.ppg}</span> ppg</div>
      <div class="player-stat"><span class="hi">${p.games}</span>g</div>
      <div class="player-ceil" style="color:${ceilColor(p.ceil)}">≤$${p.ceil}</div>
      ${actionsHtml}
    </div>`;
}

function renderPos(pos) {
  const el = document.getElementById(`list-${pos}`);

  const all       = TARGETS[pos].slice().sort((a, b) => b.ppg - a.ppg);
  const available = all.filter(p => !S.picks[p.id] && !S.lost?.[p.id] && !S.hidden[p.id]);
  const gone      = all.filter(p =>  S.picks[p.id] ||  S.lost?.[p.id]);
  const hidden    = all.filter(p => !S.picks[p.id] && !S.lost?.[p.id] &&  S.hidden[p.id]);

  const starterCount = STARTER_SLOTS[pos] ?? available.length;
  let html = '';
  available.forEach((p, i) => {
    if (i === starterCount && i < available.length) {
      html += `<div class="starter-divider">Bench</div>`;
    }
    html += playerRow(p, pos);
  });

  if (gone.length > 0) {
    html += `<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:12px 0 6px;">Gone</div>`;
    html += gone.map(p => playerRow(p, pos)).join('');
  }

  if (hidden.length > 0) {
    const hid = `hid-${pos}`;
    html += `<div class="hidden-toggle" onclick="document.getElementById('${hid}').classList.toggle('open')">Hidden (${hidden.length}) ▸</div>`;
    html += `<div class="hidden-list" id="${hid}">`;
    html += hidden.map(p => `
      <div class="player-row lost" id="row-${p.id}">
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-note">${p.note}</div>
        </div>
        <div class="player-stat"><span class="hi">${p.ppg}</span> ppg</div>
        <div class="player-stat"><span class="hi">${p.games}</span>g</div>
        <div class="player-ceil" style="color:${ceilColor(p.ceil)}">≤$${p.ceil}</div>
        <div class="player-actions">
          <button class="btn btn-undo" onclick="unhidePlayer('${p.id}')">Unhide</button>
        </div>
      </div>`).join('');
    html += `</div>`;
  }

  el.innerHTML = html || '<p class="empty-state">All players accounted for.</p>';
}

// ── Actions ──────────────────────────────────────────────────────────────────

function playerMeta(id, pos) {
  return TARGETS[pos]?.find(p => p.id === id);
}

function winPick(id, pos) {
  const inp = document.getElementById(`inp-${id}`);
  const price = parseInt(inp?.value);
  if (!price || price < 1) { inp?.focus(); return; }

  const p = playerMeta(id, pos);
  if (!p) return;

  if (!S.picks) S.picks = {};
  S.picks[id] = { name: p.name, pos: pos.toUpperCase(), tab: pos, price };
  S.spent += price;
  S.won   += 1;

  save(S);
  renderAll();
}

function markLost(id) {
  if (!S.lost) S.lost = {};
  S.lost[id] = true;
  save(S);
  renderAll();
}

function hidePlayer(id) {
  S.hidden[id] = true;
  save(S);
  renderAll();
}

function unhidePlayer(id) {
  delete S.hidden[id];
  save(S);
  renderAll();
}

function undoPick(id, pos) {
  const pick = S.picks?.[id];
  if (pick) {
    S.spent -= pick.price;
    S.won   -= 1;
    delete S.picks[id];
  }
  save(S);
  renderAll();
}

function undoLost(id) {
  delete S.lost[id];
  save(S);
  renderAll();
}

function resetState() {
  if (!confirm('Reset all picks? This cannot be undone.')) return;
  S = JSON.parse(JSON.stringify(SEED));
  save(S);
  renderAll();
}

// ── Tabs ─────────────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── Init ─────────────────────────────────────────────────────────────────────

function posBudgetSpent(tabKey) {
  return Object.values(S.picks)
    .filter(p => p.tab === tabKey)
    .reduce((sum, p) => sum + p.price, 0);
}

function renderBudgetBreakdown() {
  const el = document.getElementById('budget-breakdown');
  el.innerHTML = POS_SLOTS.map(s => {
    if (s.isQB) {
      const qb2Pick  = Object.values(S.picks).find(p => p.tab === 'qb');
      const qb2Spent = qb2Pick ? qb2Pick.price : 0;
      const qb2Rem   = 65 - qb2Spent;
      const totalSpent = 220 + qb2Spent;
      const pct = Math.min(100, (totalSpent / s.budget) * 100);
      const qb2Display = qb2Pick
        ? `<span style="color:var(--green);font-weight:700">${qb2Pick.name} · $${qb2Pick.price}</span>`
        : `<span style="color:${s.color};font-weight:700">$${qb2Rem} left</span>`;
      return `
        <div class="budget-pos">
          <div class="budget-pos-label">QB</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin:4px 0 2px">
            <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">QB1</span>
            <span style="font-size:12px;color:var(--muted)">Drake Maye · <span style="color:var(--muted)">$220</span></span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
            <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">QB2</span>
            <span style="font-size:12px">${qb2Display}</span>
          </div>
          <div class="budget-bar">
            <div class="budget-bar-fill" style="width:${pct}%;background:${s.color}"></div>
          </div>
        </div>`;
    }

    const spent   = s.fixed ? 0 : posBudgetSpent(s.key);
    const rem     = s.budget - spent;
    const pct     = Math.min(100, (spent / s.budget) * 100);
    const over    = rem < 0;
    const warn    = !over && rem < s.budget * 0.25;
    const remColor = over ? 'var(--red)' : warn ? 'var(--yellow)' : s.color;
    const barBg    = s.key === 'bench' ? 'var(--muted)' :
                     over ? 'var(--red)' : warn ? 'var(--yellow)' : s.color;
    return `
      <div class="budget-pos">
        <div class="budget-pos-label">${s.label}</div>
        <div class="budget-pos-remaining" style="color:${remColor}">$${rem}</div>
        <div class="budget-pos-total">of $${s.budget}</div>
        <div class="budget-bar">
          <div class="budget-bar-fill" style="width:${pct}%;background:${barBg}"></div>
        </div>
      </div>`;
  }).join('');

  // Update section-meta for each position tab
  const metas = [
    { key: 'te', budget: 450, suffix: '· targeting McBride + Bowers' },
    { key: 'qb', budget:  65, suffix: '· Maye is QB1' },
    { key: 'wr', budget: 155, suffix: '· stars-and-scrubs' },
    { key: 'rb', budget:  80, suffix: '· need 3' },
  ];
  metas.forEach(m => {
    const metaEl = document.getElementById(`meta-${m.key}`);
    if (!metaEl) return;
    const spent   = posBudgetSpent(m.key);
    const rem     = m.budget - spent;
    const over    = rem < 0;
    const warn    = !over && rem < m.budget * 0.25;
    const color   = over ? 'var(--red)' : warn ? 'var(--yellow)' : '';
    const style   = color ? ` style="color:${color}"` : '';
    const players = TARGETS[m.key] || [];
    const avail   = players.filter(p => !S.picks[p.id] && !S.lost?.[p.id]).length;
    const aColor  = avail === 0 ? 'var(--red)' : 'var(--muted)';
    metaEl.innerHTML = `Budget: <span${style}>$${rem}</span> / $${m.budget} ${m.suffix} &nbsp;·&nbsp; <span style="color:${aColor}">${avail}/${players.length} available</span>`;
  });
}

function renderAll() {
  renderHeader();
  renderRoster();
  renderBudgetBreakdown();
  ['te', 'qb', 'wr', 'rb'].forEach(renderPos);
}

renderAll();
</script>
